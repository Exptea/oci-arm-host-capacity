name: A1 Sniper Debug

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Verify Secrets are present
        run: |
          echo "Checking variables..."
          if [ -z "${{ secrets.OCI_REGION }}" ]; then echo "REGION IS MISSING"; fi
          if [ -z "${{ secrets.OCI_USER_OCID }}" ]; then echo "USER_OCID IS MISSING"; fi
          if [ -z "${{ secrets.OCI_PRIVATE_KEY }}" ]; then echo "PRIVATE_KEY IS MISSING"; fi
          if [ -z "${{ secrets.OCI_IMAGE_ID }}" ]; then echo "IMAGE_ID IS MISSING"; fi

      - name: Install
        run: composer install --no-interaction

      - name: Create Private Key File
        # This takes your secret and turns it into a real file the script can see
        run: echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_key.pem

      - name: Snipe
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: ./oci_api_key.pem 
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          
          # ADD THESE TWO LINES BELOW:
          OCI_SHAPE: VM.Standard.A1.Flex
          OCI_OCPUS: 4
          OCI_MEMORY_IN_GBS: 24
          OCI_BOOT_VOLUME_SIZE_IN_GBS: 50
        run: php index.php
