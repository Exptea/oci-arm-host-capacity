name: Check availability and create instance

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # This will try every 5 minutes automatically

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # FIXED: Updated from v2
      - name: Set up PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: composer install
      - name: Run script
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: php index.php

